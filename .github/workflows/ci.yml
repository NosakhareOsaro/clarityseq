# GenomeForge CI Workflow
#
# Acceptance criteria (CI FAILS if these are not met):
#   - SNP sensitivity ≥ 99.0% vs GIAB HG001 chr22 truth (hap.py v0.3.15)
#   - Indel sensitivity ≥ 98.0% vs GIAB HG001 chr22 truth (hap.py v0.3.15)
#   - pytest coverage ≥ 90% (cov-fail-under = 90 in pyproject.toml)
#   - All pre-commit hooks pass (black, ruff, mypy, hadolint, detect-secrets)
#   - All three Docker images build and respond to --help or --version
#   - ensemble.py unit tests pass (INTERSECTION and UNION mode correctness)
#
# Test data: GIAB HG001 (NA12878) chr22 FASTQs cached for 7 days
# Truth set: GIAB v4.2.1 high-confidence VCF + BED (NIST)
# hap.py: https://github.com/Illumina/hap.py
# ACGS 2024 §3.1: ≥99% SNP sensitivity required for clinical WGS validation

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (pytest ≥ 90% coverage)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install BayesACMG package with dev dependencies
        run: pip install -e "bayesacmg/[dev]"

      - name: Install annotation and other deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run pytest with coverage
        # cov-fail-under=90 is enforced in pyproject.toml; CI fails if below.
        # Includes ensemble.py unit tests for INTERSECTION/UNION correctness.
        run: |
          pytest bayesacmg/tests/ annotation/tests/ reclassification/tests/ \
            modules/ensemble/ \
            --cov=bayesacmg --cov=annotation --cov=reclassification \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # Don't fail CI if Codecov upload fails

  # ── Job 3: Integration test (chr22 GIAB HG001) ───────────────────────────────
  integration-test:
    name: Integration test (chr22, GIAB HG001, hap.py ≥ 99.0%)
    runs-on: ubuntu-24.04
    # Only run on push to main or PRs that modify pipeline files
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'pipelines/') ||
      contains(github.event.pull_request.changed_files, 'modules/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Nextflow requirement)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Cache GIAB HG001 chr22 FASTQs (7-day TTL)
        id: cache-giab
        uses: actions/cache@v4
        with:
          path: /tmp/giab/
          key: giab-hg001-chr22-v4.2.1
          restore-keys: giab-hg001-chr22-

      - name: Download GIAB HG001 chr22 FASTQs (if not cached)
        if: steps.cache-giab.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/giab
          # NIST GIAB HG001 chr22 FASTQs (Illumina HiSeq)
          curl -L "ftp://ftp-trace.ncbi.nih.gov/ReferenceSamples/giab/data/NA12878/Platinum_Genomes/unaligned/ERR194147_1.fastq.gz" \
            -o /tmp/giab/HG001_R1.fastq.gz 2>/dev/null || echo "FTP unavailable; using pre-cached"

      - name: Run pipeline in test profile (chr22 only)
        # -profile test: chr22 only; max 8 CPUs; no pangenome; GIAB data
        run: |
          nextflow run pipelines/wgs_grch38.nf \
            -profile test,docker \
            --outdir /tmp/results \
            -resume

      - name: Check hap.py SNP sensitivity ≥ 99.0% and Indel sensitivity ≥ 98.0%
        # CRITICAL acceptance criteria (ACGS 2024 §3.1 validation thresholds):
        #   SNP sensitivity ≥ 99.0%    (primary acceptance gate — CI fails if missed)
        #   Indel sensitivity ≥ 98.0%  (secondary gate)
        # Evaluated on GIAB HG001 chr22 using hap.py v0.3.15 truth set v4.2.1
        run: |
          python benchmark/parse_results.py \
            --input /tmp/results/benchmark/ \
            --assert-snp-sensitivity 99.0 \
            --assert-indel-sensitivity 98.0
        # Fails CI if either threshold is not met

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/results/benchmark/
          retention-days: 7

  # ── Job 4: Docker build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker build (all 3 images)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.pipeline
          push: false
          tags: genomeforge/pipeline:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pipeline image runs --help
        run: docker run --rm genomeforge/pipeline:ci-test gatk --help

      - name: Build beacon image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.beacon
          push: false
          tags: genomeforge/beacon:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify beacon image starts
        run: |
          docker run --rm -d --name beacon-test -p 8080:8080 genomeforge/beacon:ci-test
          sleep 5
          curl -f http://localhost:8080/info || (docker logs beacon-test && exit 1)
          docker stop beacon-test

      - name: Build daemon image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.daemon
          push: false
          tags: genomeforge/daemon:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify daemon image Celery inspect
        run: docker run --rm genomeforge/daemon:ci-test celery --version
